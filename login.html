<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>球赛投注记录 - 登录</title>
    <script src="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f4f7fb;
            --surface: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --line: #e2e8f0;
            --success: #16a34a;
            --danger: #dc2626;
        }
        
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.08) 0%, rgba(15, 118, 110, 0.08) 100%), var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }
        
        .login-header {
            padding: 32px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary), #0f766e);
            color: white;
        }
        
        .brand-mark {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
        }
        
        .login-header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 800;
        }
        
        .login-header p {
            margin: 8px 0 0;
            opacity: 0.9;
            font-size: 14px;
        }
        
        .login-body {
            padding: 28px 32px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #334155;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            border: 2px solid var(--line);
            border-radius: 12px;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        
        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        
        .form-group input::placeholder {
            color: #94a3b8;
        }
        
        .btn {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 750;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn:hover {
            transform: translateY(-1px);
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.25);
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        
        .btn-secondary {
            background: #f1f5f9;
            color: #334155;
            margin-top: 12px;
        }
        
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        
        .error-message {
            background: #fee2e2;
            color: var(--danger);
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .success-message {
            background: #dcfce7;
            color: var(--success);
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .form-footer {
            margin-top: 24px;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
        }
        
        .form-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .form-footer a:hover {
            text-decoration: underline;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .toggle-password {
            position: relative;
        }
        
        .toggle-password button {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 16px;
        }
        
        .toggle-password input {
            padding-right: 44px;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="brand-mark">
                <i class="fa fa-trophy"></i>
            </div>
            <h1>球赛投注记录系统</h1>
            <p>登录您的账户，管理投注记录</p>
        </div>
        
        <div class="login-body">
            <div id="error-message" class="error-message hidden">
                <i class="fa fa-exclamation-circle"></i>
                <span id="error-text">登录失败，请重试</span>
            </div>
            
            <div id="success-message" class="success-message hidden">
                <i class="fa fa-check-circle"></i>
                <span id="success-text">注册成功，请登录</span>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">邮箱地址</label>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>
                
                <div class="form-group toggle-password">
                    <label for="password">密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                    <button type="button" id="toggle-password-btn" onclick="togglePassword()">
                        <i class="fa fa-eye-slash"></i>
                    </button>
                </div>
                
                <button type="submit" id="login-btn" class="btn btn-primary">
                    <i class="fa fa-sign-in"></i>
                    <span>登录</span>
                </button>
                
                <button type="button" id="register-btn" class="btn btn-secondary">
                    <i class="fa fa-user-plus"></i>
                    <span>注册新账户</span>
                </button>
            </form>
            
            <div class="form-footer">
                <a href="#" id="forgot-password">忘记密码？</a>
            </div>
        </div>
    </div>

    <script>
        let isLoginMode = true;
        let isLoading = false;
        
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('login-form');
            const loginBtn = document.getElementById('login-btn');
            const registerBtn = document.getElementById('register-btn');
            
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                handleSubmit();
            });
            
            registerBtn.addEventListener('click', function() {
                toggleMode();
            });
            
            document.getElementById('forgot-password').addEventListener('click', function(e) {
                e.preventDefault();
                forgotPassword();
            });
        });
        
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.getElementById('toggle-password-btn');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.innerHTML = '<i class="fa fa-eye"></i>';
            } else {
                passwordInput.type = 'password';
                toggleBtn.innerHTML = '<i class="fa fa-eye-slash"></i>';
            }
        }
        
        function toggleMode() {
            isLoginMode = !isLoginMode;
            const loginBtn = document.getElementById('login-btn');
            const registerBtn = document.getElementById('register-btn');
            
            if (isLoginMode) {
                loginBtn.innerHTML = '<i class="fa fa-sign-in"></i><span>登录</span>';
                registerBtn.innerHTML = '<i class="fa fa-user-plus"></i><span>注册新账户</span>';
                document.querySelector('.login-header h1').textContent = '球赛投注记录系统';
                document.querySelector('.login-header p').textContent = '登录您的账户，管理投注记录';
            } else {
                loginBtn.innerHTML = '<i class="fa fa-user-plus"></i><span>注册账户</span>';
                registerBtn.innerHTML = '<i class="fa fa-sign-in"></i><span>已有账户？登录</span>';
                document.querySelector('.login-header h1').textContent = '创建新账户';
                document.querySelector('.login-header p').textContent = '注册账户，开始管理您的投注记录';
            }
            
            hideMessages();
        }
        
        function handleSubmit() {
            if (isLoading) return;
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            hideMessages();
            setLoading(true);
            
            if (isLoginMode) {
                login(email, password);
            } else {
                register(email, password);
            }
        }
        
        async function login(email, password) {
            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'login', email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    saveCurrentUser(data.user, data.session);
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                } else {
                    setLoading(false);
                    showError(data.error || '登录失败');
                }
            } catch (error) {
                setLoading(false);
                console.error('Login error:', error);
                showError('网络错误，请稍后重试');
            }
        }
        
        async function register(email, password) {
            if (password.length < 6) {
                setLoading(false);
                showError('密码至少需要6位');
                return;
            }
            
            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'register', email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    setLoading(false);
                    showSuccess('注册成功，请登录');
                    toggleMode();
                } else {
                    setLoading(false);
                    showError(data.error || '注册失败');
                }
            } catch (error) {
                setLoading(false);
                console.error('Register error:', error);
                showError('网络错误，请稍后重试');
            }
        }
        
        function forgotPassword() {
            const email = prompt('请输入您注册时使用的邮箱：');
            if (email) {
                alert('密码重置链接已发送到您的邮箱！\n（提示：在Supabase控制台中可以重置密码）');
            }
        }
        
        function saveCurrentUser(user, session) {
            localStorage.setItem('currentUser', JSON.stringify({
                id: user.id,
                email: user.email,
                token: session?.access_token || generateToken()
            }));
        }
        
        function generateToken() {
            return Math.random().toString(36).substring(2) + Date.now().toString(36);
        }
        
        function setLoading(loading) {
            isLoading = loading;
            const btn = document.getElementById('login-btn');
            
            if (loading) {
                btn.innerHTML = '<div class="spinner"></div><span>处理中...</span>';
                btn.disabled = true;
            } else {
                if (isLoginMode) {
                    btn.innerHTML = '<i class="fa fa-sign-in"></i><span>登录</span>';
                } else {
                    btn.innerHTML = '<i class="fa fa-user-plus"></i><span>注册账户</span>';
                }
                btn.disabled = false;
            }
        }
        
        function showError(message) {
            document.getElementById('error-text').textContent = message;
            document.getElementById('error-message').classList.remove('hidden');
        }
        
        function showSuccess(message) {
            document.getElementById('success-text').textContent = message;
            document.getElementById('success-message').classList.remove('hidden');
        }
        
        function hideMessages() {
            document.getElementById('error-message').classList.add('hidden');
            document.getElementById('success-message').classList.add('hidden');
        }
    </script>
</body>
</html>
